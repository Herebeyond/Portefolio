# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# Toutes les pages du portfolio sont statiques : on utilise TemplateController
# pour éviter de créer un contrôleur PHP par page.

app_home:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults:
        template: home/index.html.twig

app_skills:
    path: /competences
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults:
        template: skills/index.html.twig

app_projects:
    path: /projets
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults:
        template: projects/index.html.twig

app_education:
    path: /formation
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults:
        template: education/index.html.twig

app_veille:
    path: /veille
    controller: Symfony\Bundle\FrameworkBundle\Controller\TemplateController
    defaults:
        template: veille/index.html.twig
